<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kaii VN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* navbar */

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(12px);
z-index:100;
}

.logo{
color:#00ffd5;
font-size:22px;
font-weight:bold;
}

.menu a{
margin-left:20px;
text-decoration:none;
color:white;
font-size:14px;
}

.menu a:hover{
color:#00ffd5;
}

/* hero */

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1503264116251-35a269479413") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero-box{
background:rgba(0,0,0,0.65);
padding:60px;
border-radius:15px;
box-shadow:0 0 60px rgba(0,255,213,0.3);
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.hero p{
margin-bottom:25px;
}

.btn{
background:#00ffd5;
color:black;
padding:12px 30px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* section */

.section{
padding:100px 20px;
max-width:1100px;
margin:auto;
text-align:center;
}

.section h2{
color:#00ffd5;
font-size:34px;
margin-bottom:30px;
}

/* cards */

.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#121212;
padding:30px;
width:260px;
border-radius:12px;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px #00ffd5;
}

/* gallery */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.08);
}

/* footer */

footer{
background:black;
padding:40px;
text-align:center;
margin-top:80px;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">Kaii VN</div>

<div class="menu">
<a href="#">Trang chủ</a>
<a href="#">Nhân vật</a>
<a href="#">Gallery</a>
<a href="#">Liên hệ</a>
</div>

</div>

<div class="hero">

<div class="hero-box">

<h1>Kaii Visual Novel</h1>

<p>Trải nghiệm visual novel trực tiếp trên web</p>

<a class="btn">Bắt đầu</a>

</div>

</div>

<div class="section">

<h2>Tính năng</h2>

<div class="cards">

<div class="card">
<h3>Visual Novel</h3>
<p>Scene hiển thị giống game.</p>
</div>

<div class="card">
<h3>Chạy trên web</h3>
<p>Không cần tải game.</p>
</div>

<div class="card">
<h3>Dễ mở rộng</h3>
<p>Có thể thêm nhiều story.</p>
</div>

</div>

</div>

<div class="section">

<h2>Gallery</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
<img src="https://images.unsplash.com/photo-1503264116251-35a269479413">

</div>

</div>

<footer>

© 2026 Kaii VN

</footer>

</body>
</html>
